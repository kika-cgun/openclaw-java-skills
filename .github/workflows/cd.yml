name: CD — Deploy to VPS

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy"
        required: false
        default: "manual trigger"

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Build JAR
        run: ./gradlew bootJar --no-daemon

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=manual-$(date +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT
          fi

      - name: Copy JAR to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "build/libs/*.jar"
          target: "/opt/openclaw/releases/${{ steps.version.outputs.tag }}/"
          strip_components: 2

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            VERSION="${{ steps.version.outputs.tag }}"
            JAR=$(ls /opt/openclaw/releases/$VERSION/*.jar | head -1)

            echo "Deploying $JAR..."

            # Atomic symlink swap
            ln -sfn "$JAR" /opt/openclaw/current.jar

            # Restart service
            sudo systemctl restart openclaw

            # Wait and verify
            sleep 5
            if systemctl is-active --quiet openclaw; then
              echo "Deploy successful: $VERSION"
            else
              echo "Deploy FAILED — rolling back..."
              sudo systemctl status openclaw --no-pager
              exit 1
            fi

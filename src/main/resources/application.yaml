spring:
  application:
    name: OpenClaw
  datasource:
    url: jdbc:postgresql://localhost:5432/openclaw
    username: ${DB_USERNAME:openclaw}
    password: ${DB_PASSWORD:openclaw}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

openrouter:
  api-key: ${OPENROUTER_API_KEY}
  model: ${OPENROUTER_MODEL:stepfun/step-3-5-flash:free}
  base-url: https://openrouter.ai/api/v1

telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN}
  chat-id: ${TELEGRAM_CHAT_ID}

app:
  api-key: ${APP_API_KEY}
  skills:
    career:
      scraping:
        delay-between-sources-ms: ${CAREER_SCRAPING_DELAY_BETWEEN_SOURCES_MS:900}
        delay-jitter-ms: ${CAREER_SCRAPING_DELAY_JITTER_MS:250}
      scoring:
        max-offers-per-run: ${CAREER_SCORING_MAX_OFFERS_PER_RUN:15}
        enable-rule-prefilter: ${CAREER_SCORING_ENABLE_RULE_PREFILTER:true}
        enable-cache: ${CAREER_SCORING_ENABLE_CACHE:true}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

services:

  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: openclaw-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: openclaw
      POSTGRES_USER: ${DB_USERNAME:-openclaw}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-openclaw}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-openclaw} -d openclaw"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── OpenClaw App ─────────────────────────────────────────────────────────────
  app:
    build: .
    container_name: openclaw-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # Database
      DB_USERNAME: ${DB_USERNAME:-openclaw}
      DB_PASSWORD: ${DB_PASSWORD:-openclaw}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/openclaw

      # AI model (OpenRouter)
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-stepfun/step-3-5-flash:free}

      # Telegram notifications
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}

      # REST API protection
      APP_API_KEY: ${APP_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health 2>/dev/null || curl -sf http://localhost:8080/swagger-ui.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
